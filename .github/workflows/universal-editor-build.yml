name: Universal Editor - Build & Release

on:
  push:
    tags:
      - 'editor-universal-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: universal-editor/desktop-overlay
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clean old dist
        working-directory: universal-editor/desktop-overlay
        run: |
          Remove-Item -Recurse -Force "dist" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "build" -ErrorAction SilentlyContinue

      - name: Build with PyInstaller
        working-directory: universal-editor/desktop-overlay
        run: |
          pyinstaller --noconfirm editor_universal.spec

      - name: Build installer with Inno Setup
        working-directory: universal-editor/desktop-overlay
        run: |
          iscc installer.iss

      - name: Create ZIP - Chrome Extension
        working-directory: universal-editor
        run: |
          Compress-Archive -Path "chrome-extension/*" -DestinationPath "UniversalEditor-Chrome-${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Universal Editor ${{ github.ref_name }}"
          body: |
            # Universal Editor ${{ github.ref_name }}

            Draw, highlight, and annotate directly over any window on your screen. Includes a desktop overlay app and a Chrome extension for web annotations.

            ### Download
            | File | Description |
            |------|-------------|
            | `.exe` installer | Desktop overlay app (Windows) |
            | `.zip` Chrome extension | Load as unpacked extension in Chrome |

            ### What's inside
            - **Draw mode** (`Ctrl+Num1`) — freehand drawing over any window with customizable pen color and thickness
            - **Reading guide** (`Ctrl+Num2`) — highlights the line you're reading, great for long documents or code reviews
            - **Text mode** (`Ctrl+Num3`) — place floating text annotations anywhere on screen
            - **Chrome extension** — same annotation tools inside your browser on any webpage
            - Right-click while drawing to change colors, thickness, or clear the canvas
            - `Ctrl+Num0` to quit

            ### How to install the Chrome extension
            1. Download and extract the `.zip` file
            2. Open Chrome → `chrome://extensions`
            3. Enable "Developer mode" (top right)
            4. Click "Load unpacked" and select the extracted folder

            > **Antivirus notice:** Windows Defender may flag this app as unknown — this is a common false positive for open-source apps. Click "More info" → "Run anyway". [Learn more](https://github.com/TrilionAi/creations#antivirus--false-positive-warning)
          files: |
            universal-editor/desktop-overlay/installer_output/Universal_Editor_Desktop_Setup_1.1.0.exe
            universal-editor/UniversalEditor-Chrome-${{ github.ref_name }}.zip
