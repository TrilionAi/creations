name: Desk Stickies - Build & Release

on:
  push:
    tags:
      - 'desk-stickies-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (npm)
        working-directory: desk-stickies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desk-stickies
          tagName: ${{ github.ref_name }}
          releaseName: 'Desk Stickies ${{ github.ref_name }}'
          releaseBody: |
            ## Desk Stickies ${{ github.ref_name }}

            Paper-style sticky notes that float on your desktop.

            ### Download
            - **Windows**: `.exe` installer
            - **macOS**: `.dmg` disk image

            ### Features
            - Native glass/acrylic transparency
            - Rich text editor with formatting
            - Nested checklists with auto-green
            - Priority colors (red, orange, yellow, green)
            - System tray integration
            - SQLite persistence
          releaseDraft: false
          prerelease: false
