name: Perf Overlay - Build & Release

on:
  push:
    tags:
      - 'perf-overlay-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: perf-overlay
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: perf-overlay
        run: |
          pyinstaller --onefile --noconsole --name "PerfOverlay" --icon icon.ico main.py 2>$null; if (!(Test-Path "dist/PerfOverlay.exe")) { pyinstaller --onefile --noconsole --name "PerfOverlay" main.py }

      - name: Create ZIP artifact
        working-directory: perf-overlay
        run: |
          Compress-Archive -Path "dist/PerfOverlay.exe" -DestinationPath "dist/PerfOverlay-${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Perf Overlay ${{ github.ref_name }}"
          body: |
            ## Perf Overlay ${{ github.ref_name }}

            Lightweight system performance monitoring overlay.

            ### Download
            - **Windows**: `.zip` with portable `.exe`

            ### Features
            - CPU, GPU, RAM and temperature monitoring
            - Transparent always-on-top overlay
            - Configurable hotkeys
            - Drag mode for positioning
            - System tray integration
          files: |
            perf-overlay/dist/PerfOverlay-${{ github.ref_name }}.zip
            perf-overlay/dist/PerfOverlay.exe
