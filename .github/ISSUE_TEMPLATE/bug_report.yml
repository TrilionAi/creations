name: Bug Report
description: Report a bug in one of the apps
labels: ["bug"]
body:
  - type: dropdown
    id: app
    attributes:
      label: App
      description: Which app is affected?
      options:
        - Glass Post-its
        - Float Timer
        - Universal Editor
        - Perf Overlay
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using? (check in the release or installer)
      placeholder: "e.g., v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable
