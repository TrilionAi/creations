name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: app
    attributes:
      label: App
      description: Which app is this for? (or "New creation" for a brand new app idea)
      options:
        - Glass Post-its
        - Float Timer
        - Universal Editor
        - Perf Overlay
        - New creation idea
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: How would this help your workflow?
    validations:
      required: true
